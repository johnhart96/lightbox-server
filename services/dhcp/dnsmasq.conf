# Disable DNS server functionality, running purely as DHCPv4/v6 and Router Advertisement server
port=0

# Log DHCP queries to stdout for container logs
log-dhcp

# Store lease information in the shared configuration folder so the web panel can read/parse it
dhcp-leasefile=/etc/dnsmasq.d/leases

# Include dynamic configuration files generated by the PHP web dashboard
conf-dir=/etc/dnsmasq.d/,*.conf
