services:
  web:
    build:
      context: ./services/web
    container_name: lightbox-web
    user: "root"
    ports:
      - "8080:80"
    volumes:
      - ./data:/data
      - ./data:/var/www/html/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=UTC
    restart: unless-stopped
    # Apache only starts after init.php succeeds, so a passing health check
    # guarantees all config files in data/ have been generated.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  bind9:
    image: ubuntu/bind9:latest
    container_name: lightbox-bind9
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./data/bind/named.conf.options:/etc/bind/named.conf.options
      - ./data/bind/named.conf.local:/etc/bind/named.conf.local
      - ./data/bind/zones:/etc/bind/zones
      - ./data/bind/cache:/var/cache/bind
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

  dhcp:
    build:
      context: ./services/dhcp
    container_name: lightbox-dhcp
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./data/dnsmasq:/etc/dnsmasq.d
      - ./data/network:/data/network
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

  ntp:
    build:
      context: ./services/ntp
    container_name: lightbox-ntp
    network_mode: host
    cap_add:
      - SYS_TIME
    volumes:
      - ./data/chrony:/etc/chrony
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

  samba:
    build:
      context: ./services/samba
    container_name: lightbox-samba
    network_mode: host
    volumes:
      - ./data/samba:/etc/samba
      - ./data/shares:/shares
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

  acn:
    build:
      context: ./services/acn
    container_name: lightbox-acn
    network_mode: host
    environment:
      - API_URL=http://localhost:8080/api.php
      - POLL_INTERVAL=30
      - STARTUP_DELAY=15
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
